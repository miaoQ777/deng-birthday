<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>赛博空间 · 生日祝福</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====== 横屏锁定遮罩层 ====== -->
  <div id="orientation-overlay">
    <div class="overlay-bg"></div>
    <div class="overlay-content">
      <!-- 手机旋转动画 -->
      <div class="phone-icon">
        <div class="phone-body">
          <div class="phone-screen"></div>
        </div>
        <div class="rotate-arrow"></div>
      </div>
      <p class="overlay-text">
        <span class="glitch-text" data-text="检测到引力异常">检测到引力异常</span>
        <br>
        <span class="overlay-sub">请横屏解锁赛博空间</span>
      </p>
    </div>
  </div>

  <!-- ====== 全局背景粒子画布 ====== -->
  <canvas id="bg-canvas"></canvas>

  <!-- ====== 场景零：身份验证门禁 ====== -->
  <section id="scene-0" class="scene active">
    <div class="crt-overlay"></div>
    <div class="name-gate-container">
      <div class="name-gate-header">
        <span class="gate-label">◆ 赛博空间入口 ◆</span>
      </div>
      <div class="name-gate-body">
        <div class="gate-prompt">
          <span class="gate-cursor">></span> 请输入访问者姓名：
        </div>
        <input type="text" id="name-input" class="gate-input" maxlength="10" autocomplete="off" spellcheck="false">
        <div class="gate-hint">输入后按回车确认</div>
      </div>
      <div class="gate-error hidden" id="gate-error">
        <span class="error-icon">✕</span> 身份验证失败：不予服务
      </div>
    </div>
    <div class="corner-decoration corner-tl"></div>
    <div class="corner-decoration corner-tr"></div>
    <div class="corner-decoration corner-bl"></div>
    <div class="corner-decoration corner-br"></div>
  </section>

  <!-- ====== 场景一：黑客终端初始化 ====== -->
  <section id="scene-1" class="scene hidden">
    <!-- 自上而下扫描线 -->
    <div class="scan-line"></div>
    <!-- CRT 扫描线叠加层 -->
    <div class="crt-overlay"></div>
    <!-- 终端容器 -->
    <div class="terminal-container">
      <div class="terminal-header">
        <span class="terminal-dot dot-red"></span>
        <span class="terminal-dot dot-yellow"></span>
        <span class="terminal-dot dot-green"></span>
        <span class="terminal-title">SYS_CORE::INIT</span>
      </div>
      <div class="terminal-body" id="terminal-body">
        <div class="terminal-line" id="terminal-line-1"></div>
        <div class="terminal-line" id="terminal-line-2"></div>
        <div class="terminal-line" id="terminal-line-3"></div>
        <div class="terminal-line" id="terminal-line-4"></div>
        <span class="terminal-cursor" id="terminal-cursor">█</span>
      </div>
    </div>
    <!-- 四角装饰 -->
    <div class="corner-decoration corner-tl"></div>
    <div class="corner-decoration corner-tr"></div>
    <div class="corner-decoration corner-bl"></div>
    <div class="corner-decoration corner-br"></div>
  </section>

  <!-- ====== 场景二：能量注入与冲突 ====== -->
  <section id="scene-2" class="scene hidden">
    <div class="crt-overlay"></div>
    <div class="energy-container">
      <!-- 能量注入文本区（每行自带进度条，由 JS 动态生成） -->
      <div class="energy-lines" id="energy-lines"></div>
      <!-- 终端报错刷屏区 -->
      <div class="error-log hidden" id="error-log"></div>
    </div>

    <!-- 警告弹窗 -->
    <div class="warning-overlay hidden" id="warning-overlay">
      <div class="warning-dialog">
        <div class="warning-icon">⚠</div>
        <div class="warning-title">【警告】</div>
        <div class="warning-body">
          检测到外来负面协议：<br>
          <span class="warning-highlight">「忧」</span> · <span class="warning-highlight">「虑」</span>
        </div>
        <div class="warning-question">是否立即启动讨伐程序？</div>
        <div class="warning-buttons">
          <button class="btn-fight btn-fight-primary" id="btn-fight-1">
            <span class="btn-text">揍他</span>
            <span class="btn-glitch"></span>
          </button>
          <button class="btn-fight btn-fight-secondary" id="btn-fight-2">
            <span class="btn-text">一定要揍他</span>
            <span class="btn-glitch"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- 四角装饰 -->
    <div class="corner-decoration corner-tl"></div>
    <div class="corner-decoration corner-tr"></div>
    <div class="corner-decoration corner-bl"></div>
    <div class="corner-decoration corner-br"></div>
  </section>

  <!-- ====== 场景三：弹幕射击游戏 ====== -->
  <section id="scene-3" class="scene hidden">
    <div class="game-wrapper">
      <!-- 游戏 HUD -->
      <div class="game-hud">
        <div class="hud-boss">
          <span class="hud-name name-you">忧</span>
          <span class="hud-hp"><span id="hp-bar-you">██████████████████████████████████████████████████</span></span>
        </div>
        <div class="hud-boss">
          <span class="hud-name name-lv">虑</span>
          <span class="hud-hp"><span id="hp-bar-lv">██████████████████████████████████████████████████</span></span>
        </div>
      </div>
      <!-- 游戏画布 -->
      <div class="game-canvas-wrap">
        <canvas id="game-canvas" width="640" height="360"></canvas>
      </div>
      <!-- 移动端虚拟按键 -->
      <div class="game-controls" id="game-controls">
        <div class="ctrl-dpad">
          <button class="ctrl-btn ctrl-up"    id="btn-up">▲</button>
          <button class="ctrl-btn ctrl-down"  id="btn-down">▼</button>
        </div>
        <div class="ctrl-action">
          <button class="ctrl-btn ctrl-attack" id="btn-attack">⚡<br>攻击</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ====== 场景四：毕业温情寄语（占位） ====== -->
  <section id="scene-4" class="scene hidden">
    <div class="crt-overlay"></div>
    <div class="placeholder-text">场景四：白光转场与中考毕业温情寄语</div>
  </section>

  <!-- ====== 场景五：生日蜡烛与烟花（占位） ====== -->
  <section id="scene-5" class="scene hidden">
    <div class="crt-overlay"></div>
    <div class="placeholder-text">场景五：关灯点蜡烛、烟花与弹幕祝福墙</div>
  </section>

  <script src="script.js"></script>
</body>
</html>
